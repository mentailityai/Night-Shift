# =============================================================================
# Night-Shift — Alembic Configuration
# =============================================================================
# Standard Alembic ini file.  The ``sqlalchemy.url`` is overridden at runtime
# by ``alembic/env.py`` using the value from ``app.core.config``.
# =============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .

# This is overridden in env.py — kept here as a placeholder.
sqlalchemy.url = postgresql+psycopg2://nightshift:nightshift@localhost:5432/nightshift

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
